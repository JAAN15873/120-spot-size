name: Build iOS (unsigned)

on:
  workflow_dispatch:
  # Native iOS build is on hold in favor of camera_fov_check.html (the web version) — trigger
  # this manually from the Actions tab if the native prototype gets picked up again, rather
  # than running (and failing) automatically on every push.

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned archive
        run: |
          xcodebuild \
            -project FovCheck.xcodeproj \
            -scheme FovCheck \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned .ipa
        run: |
          set -e
          APP_PATH=$(find build/Build/Products -maxdepth 2 -name "*.app" | head -n 1)
          echo "App at: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r FovCheck.ipa Payload
          ls -la FovCheck.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: FovCheck-unsigned-ipa
          path: ios/FovCheck.ipa
          retention-days: 14
