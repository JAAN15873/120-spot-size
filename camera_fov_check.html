<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FOV Check">
<title>ECS/CemScanner™ FOV field check</title>
<style>
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; width:100%; height:101%; overflow-y:auto; overflow-x:hidden; background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; color:#e8e8e6;}
  #app{position:fixed; inset:0;}
  #video{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; background:#000;}
  #overlay{position:absolute; inset:0; pointer-events:none;}
  .gridline{position:absolute; top:0; bottom:0; width:1px; background:#3ec9a7;}
  .gridline .lbl{position:absolute; top:6px; font-size:11px; color:#3ec9a7; text-shadow:0 0 3px #000; white-space:nowrap;}
  .gridline .lbl.after{left:4px;}   /* label sits to the right of the line (center + left-side lines) */
  .gridline .lbl.before{right:4px;} /* label sits to the left of the line (right-side lines, so it isn't clipped off-screen) */
  .centerline{position:absolute; left:0; right:0; height:1px; background:rgba(255,255,255,0.85);}

  .brand{position:absolute; top:10px; left:10px; font-size:11px; font-weight:600; color:#7f9cf5;
    background:rgba(0,0,0,0.45); padding:4px 8px; border-radius:6px;}
  .warning{position:absolute; top:10px; left:50%; transform:translateX(-50%); font-size:12px;
    background:rgba(226,99,95,0.92); color:#fff; padding:7px 12px; border-radius:8px; max-width:78%; text-align:center;}
  .tip{position:absolute; top:54px; left:50%; transform:translateX(-50%); font-size:11px;
    background:rgba(20,21,23,0.9); color:#e0b23c; padding:6px 10px; border-radius:8px; max-width:78%; text-align:center;}

  .btn.round{position:absolute; right:8px; width:38px; height:38px; border-radius:50%;
    border:1px solid #7f9cf5; background:rgba(20,21,23,0.6); color:#e8e8e6; font-size:16px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .btn.round:active{background:rgba(51,58,86,0.8);}
  #camSwitchBtn{top:8px;}
  #photoBtn{top:54px;}
  #fsBtn{top:100px;}

  .center-msg{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:20px; text-align:center;}
  .center-msg .box{background:rgba(20,21,23,0.96); border:1px solid #52565c; border-radius:14px; padding:20px; max-width:320px;}
  .center-msg h2{font-size:16px; margin:0 0 10px;}
  .center-msg p{font-size:13px; color:#a3a6ab; line-height:1.5; margin:0 0 14px;}
  .btn{display:inline-block; padding:10px 16px; border-radius:10px; border:1px solid #7f9cf5;
    background:#2a2f45; color:#e8e8e6; font-size:14px; cursor:pointer;}
</style>
</head>
<body>
<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay"></div>
  <div class="brand">ECS/CemScanner™ FOV check</div>
  <div class="warning" id="warning" style="display:none;"></div>
  <div class="tip" id="tip" style="display:none;"></div>
  <button class="btn round" id="camSwitchBtn" title="Switch camera">🔄</button>
  <button class="btn round" id="photoBtn" title="Take photo">📷</button>
  <button class="btn round" id="fsBtn" title="Full screen">⛶</button>

  <div class="center-msg" id="permissionMsg" style="display:none;">
    <div class="box">
      <h2>Camera access needed</h2>
      <p>Allow camera access when prompted. If you already denied it, enable it for this site in Safari &rarr; aA &rarr; Website Settings.</p>
      <button class="btn" id="retryBtn">Try again</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // Fixed reference grid assuming the ultra-wide's declared FOV (120°, so ±60° from center).
  // No calibration in this build — the screen can't show more angle than the physical lens
  // captures, so a per-device calibrated angle added complexity without adding capability.
  // Rectilinear (tan-based) spacing, consistent with a geometrically distortion-corrected capture.
  var ASSUMED_HALF_FOV_RAD = 60 * Math.PI / 180;
  var GRID_ANGLES = [-60, -55, -30, 0, 30, 55, 60];

  function fractionForAngle(angleDeg){
    var rad = angleDeg * Math.PI / 180;
    return Math.tan(rad) / Math.tan(ASSUMED_HALF_FOV_RAD);
  }

  var overlay = document.getElementById("overlay");
  function render(){
    while (overlay.firstChild) overlay.removeChild(overlay.firstChild);

    var center = document.createElement("div");
    center.className = "centerline";
    center.style.top = "50%";
    overlay.appendChild(center);

    GRID_ANGLES.forEach(function(a){
      var frac = fractionForAngle(a);
      var g = document.createElement("div");
      g.className = "gridline";
      g.style.left = (50 + frac*50) + "%";
      var lbl = document.createElement("div");
      lbl.className = "lbl " + (a > 0 ? "before" : "after");
      lbl.textContent = Math.abs(a) + "°";
      g.appendChild(lbl);
      overlay.appendChild(g);
    });
  }
  render();

  // ---------- camera ----------
  var video = document.getElementById("video");
  var warningEl = document.getElementById("warning");
  var currentStream = null;
  var currentTrack = null;
  var cameras = [];
  var camIndex = -1;
  var usingUltraWide = false;
  var possiblyCropped = false;

  // "ultra" is the one word Apple keeps in Latin script across every localization of this
  // label (French "ultra grand-angle", Czech "ultraširokoúhlý", German "Ultraweitwinkel"...).
  // Matching the translated word for plain "wide" instead was the bug: the regular 1x lens's
  // label also contains "wide angle" in most languages, just without "ultra" in front of it,
  // so it was being misidentified as the ultra-wide lens.
  var ULTRA_WIDE_LABEL_RE = /ultra/i;
  var FRONT_LABEL_RE = /front|facetime|selfie|přední|frontal/i;
  function isUltraWideLabel(label){ return ULTRA_WIDE_LABEL_RE.test(label || ""); }
  function isFrontLabel(label){ return FRONT_LABEL_RE.test(label || ""); }

  var REMEMBERED_CAMERA_KEY = "fovcheck_camera_deviceId";
  function rememberCamera(deviceId){ try { localStorage.setItem(REMEMBERED_CAMERA_KEY, deviceId); } catch(e){} }
  function getRememberedCameraId(){ try { return localStorage.getItem(REMEMBERED_CAMERA_KEY); } catch(e){ return null; } }

  var isPortrait = window.innerHeight > window.innerWidth;
  function handleOrientationChange(){
    isPortrait = window.innerHeight > window.innerWidth;
    updateWarning();
  }
  window.addEventListener("resize", handleOrientationChange);
  window.addEventListener("orientationchange", handleOrientationChange);

  function updateWarning(){
    var problems = [];
    if (isPortrait) problems.push("rotate to landscape");
    if (!usingUltraWide) problems.push("switch to the ultra-wide lens");
    else if (possiblyCropped) problems.push("zoom the ultra-wide lens all the way out (this looks cropped)");
    if (problems.length){
      warningEl.style.display = "block";
      warningEl.textContent = "Please " + problems.join(" and ") + " — angles above assume both.";
    } else {
      warningEl.style.display = "none";
    }
  }

  function stopStream(){
    if (currentStream) { currentStream.getTracks().forEach(function(t){ t.stop(); }); currentStream = null; currentTrack = null; }
  }

  // Some iPhones expose the ultra-wide lens defaulting to a zoom level above its widest setting
  // (i.e. already cropped in). Force it all the way out whenever the camera has a zoom control.
  function forceMinZoom(track){
    if (!track.getCapabilities) { possiblyCropped = false; return Promise.resolve(); }
    var caps = track.getCapabilities();
    if (!caps.zoom) { possiblyCropped = false; return Promise.resolve(); }
    return track.applyConstraints({ advanced: [{ zoom: caps.zoom.min }] }).then(function(){
      var settings = track.getSettings ? track.getSettings() : {};
      possiblyCropped = typeof settings.zoom === "number" && (settings.zoom - caps.zoom.min) > 0.01;
    }).catch(function(){ possiblyCropped = false; });
  }

  function applyStream(stream, label){
    stopStream();
    currentStream = stream;
    currentTrack = stream.getVideoTracks()[0] || null;
    video.srcObject = stream;
    usingUltraWide = isUltraWideLabel(label);
    document.getElementById("permissionMsg").style.display = "none";
    var zoomCheck = currentTrack ? forceMinZoom(currentTrack) : Promise.resolve();
    return zoomCheck.then(updateWarning);
  }

  function switchToIndex(idx){
    var d = cameras[idx];
    if (!d) return Promise.resolve();
    return navigator.mediaDevices.getUserMedia({
      audio: false,
      video: { deviceId: { exact: d.deviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } }
    }).then(function(stream){
      camIndex = idx;
      rememberCamera(d.deviceId);
      return applyStream(stream, d.label);
    }).catch(function(err){ console.error("Camera switch error", err); });
  }

  function refreshDeviceList(){
    return navigator.mediaDevices.enumerateDevices().then(function(devices){
      cameras = devices.filter(function(d){ return d.kind === "videoinput" && !isFrontLabel(d.label); });
      if (cameras.length === 0) cameras = devices.filter(function(d){ return d.kind === "videoinput"; });
    });
  }

  function startCamera(){
    var rememberedId = getRememberedCameraId();
    // If we already know which lens worked last time on this phone, open it directly --
    // skip the generic "environment" default so the ultra-wide is what shows up first, not
    // whatever the browser considers the default back camera.
    var direct = rememberedId
      ? navigator.mediaDevices.getUserMedia({
          audio: false,
          video: { deviceId: { exact: rememberedId }, width: { ideal: 1920 }, height: { ideal: 1080 } }
        }).then(function(stream){
            return applyStream(stream, (stream.getVideoTracks()[0]||{}).label).then(function(){ return true; });
          })
        .catch(function(){ return false; }) // remembered device gone (new phone, permission reset, ...) -- fall through
      : Promise.resolve(false);

    return direct.then(function(usedRemembered){
      return refreshDeviceList().then(function(){
        if (usedRemembered){
          camIndex = cameras.findIndex(function(d){ return d.deviceId === rememberedId; });
          if (camIndex >= 0) return; // already on the right camera, opened directly above
        }
        var uwIndex = cameras.findIndex(function(d){ return isUltraWideLabel(d.label); });
        if (uwIndex >= 0) return switchToIndex(uwIndex);
        return switchToIndex(0);
      });
    }).catch(function(err){
      document.getElementById("permissionMsg").style.display = "flex";
      console.error("Camera error", err);
    });
  }

  document.getElementById("retryBtn").addEventListener("click", function(){ startCamera(); });
  document.getElementById("camSwitchBtn").addEventListener("click", function(){
    if (cameras.length < 2) return;
    switchToIndex((camIndex + 1) % cameras.length);
  });

  // ---------- photo capture (burns the same grid the screen shows into the saved image) ----------
  document.getElementById("photoBtn").addEventListener("click", function(){
    var vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return;
    var containerW = video.clientWidth, containerH = video.clientHeight;
    var containerAspect = containerW / containerH;
    var videoAspect = vw / vh;
    var sx, sy, sw, sh;
    if (videoAspect > containerAspect){
      sh = vh; sw = vh * containerAspect; sx = (vw - sw) / 2; sy = 0;
    } else {
      sw = vw; sh = vw / containerAspect; sx = 0; sy = (vh - sh) / 2;
    }

    var canvas = document.createElement("canvas");
    canvas.width = sw; canvas.height = sh;
    var ctx = canvas.getContext("2d");
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

    ctx.strokeStyle = "rgba(255,255,255,0.85)";
    ctx.lineWidth = Math.max(1, sh/500);
    ctx.beginPath(); ctx.moveTo(0, sh/2); ctx.lineTo(sw, sh/2); ctx.stroke();

    ctx.font = Math.round(sh*0.028) + "px sans-serif";
    ctx.textBaseline = "top";
    GRID_ANGLES.forEach(function(a){
      var frac = fractionForAngle(a);
      var x = sw/2 + frac*sw/2;
      ctx.strokeStyle = "#3ec9a7";
      ctx.lineWidth = Math.max(1, sh/700);
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, sh); ctx.stroke();
      ctx.fillStyle = "#3ec9a7";
      var label = Math.abs(a) + "°";
      var textX = a > 0 ? x - ctx.measureText(label).width - 6 : x + 6;
      ctx.fillText(label, Math.max(2, Math.min(sw-ctx.measureText(label).width-2, textX)), 8);
    });

    canvas.toBlob(function(blob){
      if (!blob) return;
      var file = new File([blob], "fov-check-" + Date.now() + ".jpg", { type: "image/jpeg" });
      if (navigator.canShare && navigator.canShare({ files: [file] })){
        navigator.share({ files: [file], title: "FOV check photo" }).catch(function(){});
      } else {
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url; a.download = file.name;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
      }
    }, "image/jpeg", 0.92);
  });

  // ---------- fullscreen ----------
  var tipEl = document.getElementById("tip");
  document.getElementById("fsBtn").addEventListener("click", function(){
    var el = document.documentElement;
    if (!document.fullscreenElement){
      var req = el.requestFullscreen || el.webkitRequestFullscreen;
      if (!req){
        showTip();
        return;
      }
      Promise.resolve(req.call(el)).catch(showTip);
    } else {
      var exit = document.exitFullscreen || document.webkitExitFullscreen;
      if (exit) exit.call(document);
    }
  });
  function showTip(){
    tipEl.style.display = "block";
    tipEl.textContent = "Full screen isn't supported in a regular Safari tab on iOS. Use Share → Add to Home Screen and open it from there instead — that view has no browser bar at all.";
    setTimeout(function(){ tipEl.style.display = "none"; }, 6000);
  }
  // Legacy trick: a 1px scroll can nudge Safari into auto-hiding its own toolbar even in a
  // normal tab. #app is position:fixed so this scroll is invisible either way. Effectiveness
  // varies by iOS version -- Add to Home Screen (above) is the guaranteed fix.
  window.addEventListener("load", function(){ setTimeout(function(){ window.scrollTo(0, 1); }, 300); });

  // ---------- boot ----------
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    document.getElementById("permissionMsg").style.display = "flex";
    document.querySelector("#permissionMsg h2").textContent = "Camera API unavailable";
    document.querySelector("#permissionMsg p").textContent = "This browser doesn't expose camera access (getUserMedia). Open this page in Safari on iOS over HTTPS.";
  } else {
    startCamera();
  }
})();
</script>
</body>
</html>
